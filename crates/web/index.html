<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>FLAPPY</title>
    <link data-trunk rel="rust" href="Cargo.toml" />
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
        background: #e8f4f8; /* 恐竜ゲーム風の淡背景 */
      }
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        /* スマホの動的ツールバーで 100% がはみ出すのを防ぐ（dvh 未対応は 100% に従う）。*/
        min-height: 100dvh;
      }
      #canvas {
        image-rendering: pixelated; /* 整数座標描画で滲み回避 */
        /* スマホ等の狭い画面でも全体が映るよう、描画バッファ（論理グリッド）は
           保ったまま表示サイズだけアスペクト比を維持して縮小する。max-width と
           max-height の両方を効かせると replaced 要素は比率を保って収まる。
           dvh は Safari の動的ツールバー対策（未対応は vh にフォールバック）。*/
        max-width: 100vw;
        max-height: 100vh;
        max-height: 100dvh;
      }
      /* スピードアップ切替（?speedup=1 を付けて読み直すだけ。canvas 外なので画面パリティ不変）。 */
      #speedup-toggle {
        position: fixed;
        top: 8px;
        left: 8px;
        font: 14px monospace;
        color: #333;
        background: rgba(232, 244, 248, 0.85);
        padding: 4px 8px;
        border-radius: 6px;
        user-select: none;
      }
    </style>
  </head>
  <body>
    <canvas id="canvas"></canvas>
    <label id="speedup-toggle">
      <input type="checkbox" id="speedup" /> スピードアップ
    </label>
    <!-- URL クエリ ?speedup=1 をチェックボックスで切り替えるだけの導線（手打ち不要）。
         実際のモード判定は wasm 側が起動時に window.location.search を読む（単一ソース）。 -->
    <script>
      (function () {
        var params = new URLSearchParams(location.search);
        var toggle = document.getElementById("speedup-toggle");
        var box = document.getElementById("speedup");
        box.checked = params.get("speedup") === "1";
        // 設定トグルのクリックを window の主操作 click リスナ（flap/restart）へ伝播させない。
        toggle.addEventListener("click", function (e) {
          e.stopPropagation();
        });
        box.addEventListener("change", function () {
          if (box.checked) params.set("speedup", "1");
          else params.delete("speedup");
          location.search = params.toString();
        });
      })();
    </script>
  </body>
</html>
