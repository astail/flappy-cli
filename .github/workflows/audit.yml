name: Security Audit

# 依存クレートの既知脆弱性（RUSTSEC）を cargo-audit で検査する。
# lock/manifest 変更時・毎週・手動で走らせる。root と crates/web の両 lock が対象。
on:
  push:
    branches: [main]
    paths:
      - "**/Cargo.lock"
      - "**/Cargo.toml"
      - ".github/workflows/audit.yml"
  pull_request:
    paths:
      - "**/Cargo.lock"
      - "**/Cargo.toml"
      - ".github/workflows/audit.yml"
  schedule:
    - cron: "0 0 * * 1" # 毎週月曜 00:00 UTC
  workflow_dispatch:

concurrency:
  group: audit-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install cargo-audit
        uses: taiki-e/install-action@ace6ebe54a6a0c86dfb5f7764b17f793b6925bc3 # v2.82.3
        with:
          # cargo-audit は「最新の RUSTSEC advisory を拾う」ことが目的のため、
          # あえてバージョン固定しない（advisory DB は実行時に最新を取得する）。
          tool: cargo-audit

      - name: Audit (workspace root)
        run: cargo audit

      - name: Audit (crates/web)
        run: cargo audit
        working-directory: crates/web
