name: Deploy to GitHub Pages

# main push で flappy-web を trunk build し、GitHub Pages へ自動デプロイする（DESIGN §6/§10）。
on:
  push:
    branches: [main]
  workflow_dispatch:

# ワークフロー既定は最小権限。build は read のみで足りる。
permissions:
  contents: read

# 同時実行は 1 本に絞る（古いデプロイは中断）。
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Rust toolchain (+ wasm32 target)
        uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
        with:
          target: wasm32-unknown-unknown

      - name: Install trunk
        uses: taiki-e/install-action@15449e3094499af05d8d964a1c884208e4b8b595 # v2.81.11
        with:
          # 本番 Pages ビルドの再現性のためバージョン固定（ci.yml と揃える）。
          tool: trunk@0.21.14

      # Pages のサブパス（/flappy-cli/）に合わせて public-url を指定する。
      - name: Trunk build (release)
        run: trunk build --release --public-url /flappy-cli/
        working-directory: crates/web

      # `_` 始まりファイル対策（Jekyll 無効化）。
      - name: Add .nojekyll
        run: touch crates/web/dist/.nojekyll

      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: crates/web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    # Pages デプロイ（GitHub Actions 方式）に必要な権限はこのジョブだけに付与する。
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
