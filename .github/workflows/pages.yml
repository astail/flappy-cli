name: Deploy to GitHub Pages

# main push で flappy-web を trunk build し、GitHub Pages へ自動デプロイする（DESIGN §6/§10）。
on:
  push:
    branches: [main]
  workflow_dispatch:

# ワークフロー既定は最小権限。build は read のみで足りる。
permissions:
  contents: read

# 同時実行は 1 本に絞る（古いデプロイは中断）。
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup Rust toolchain (+ wasm32 target)
        uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1.17.0
        with:
          target: wasm32-unknown-unknown

      - name: Install trunk
        uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853 # v2.83.2
        with:
          # 本番 Pages ビルドの再現性のためバージョン固定（ci.yml と揃える）。
          tool: trunk@0.21.14

      # Pages のサブパス（/flappy-cli/）に合わせて public-url を指定する。
      - name: Trunk build (release)
        run: trunk build --release --public-url /flappy-cli/
        working-directory: crates/web

      # `_` 始まりファイル対策（Jekyll 無効化）。
      - name: Add .nojekyll
        run: touch crates/web/dist/.nojekyll

      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: crates/web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    # Pages デプロイ（GitHub Actions 方式）に必要な権限はこのジョブだけに付与する。
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
