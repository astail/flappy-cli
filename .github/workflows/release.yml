name: Release

# `v*` タグの push で `flappy` バイナリをクロスコンパイルし GitHub Releases に添付する（issue #39）。
#
# ターゲット:
#   - x86_64-unknown-linux-musl   (静的リンク、glibc 互換性問題を回避)
#   - aarch64-unknown-linux-musl  (静的リンク)
#   - aarch64-apple-darwin        (Apple Silicon)
#
# 配布物は `flappy-<version>-<target>.tar.gz`（バイナリ + README + LICENSE 同梱）に揃え、
# Release 添付前に SHA256SUMS を集約する。
# .deb / .rpm / Homebrew / crates.io はスコープ外（別 issue）。

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "リリース用タグ (例: v0.1.0)。手動実行時のみ使用"
        required: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

# 既定は最小権限。Release 作成に必要な contents: write は release ジョブのみに付与する。
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  # tag (vX.Y.Z) と crates/core / crates/term / crates/web の各 Cargo.toml の
  # version が一致するか検証する。
  # 不一致ならここで fail させ、ビルドへ進ませない（tag = version の担保）。
  verify-version:
    name: tag と Cargo.toml version の一致を検証
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # workflow_dispatch 起動時は入力された tag をチェックアウトする。
          # tag push 時は inputs.tag が空なので github.ref にフォールバックする。
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: バージョン一致チェック
        # workflow injection 対策: untrusted な可能性のある入力（workflow_dispatch の
        # inputs.tag）は env 経由で渡し、run 本文に直接展開しない。
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          set -euo pipefail
          if [[ "${EVENT_NAME}" == "workflow_dispatch" ]]; then
            tag="${INPUT_TAG}"
          else
            tag="${GITHUB_REF#refs/tags/}"
          fi
          # vX.Y.Z 形式以外は弾く（誤入力 / 注入対策の二重防御）。
          if [[ ! "${tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.-]+)?$ ]]; then
            echo "::error::想定外の tag 形式です: ${tag}"
            exit 1
          fi
          version="${tag#v}"
          # version の単一ソースは root [workspace.package]（core/term が継承）と web の 2 箇所
          # （docs/RELEASE.md）。root を照合すれば継承する core/term の一致も担保される。
          for toml in Cargo.toml crates/web/Cargo.toml; do
            cargo_version="$(grep -m1 '^version' "${toml}" | sed -E 's/.*"([^"]+)".*/\1/')"
            if [[ "${version}" != "${cargo_version}" ]]; then
              echo "::error::tag (${tag} → ${version}) と ${toml} の version (${cargo_version}) が不一致です"
              exit 1
            fi
          done
          echo "OK: version=${version}"

  build:
    name: build (${{ matrix.target }})
    needs: verify-version
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            # GitHub-hosted の ubuntu-24.04-arm runner はネイティブ aarch64 なので
            # musl ターゲット用 linker (musl-tools) を入れれば cross 不要。
            os: ubuntu-24.04-arm
          - target: aarch64-apple-darwin
            os: macos-14
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # workflow_dispatch 起動時は入力された tag をチェックアウトする。
          # tag push 時は inputs.tag が空なので github.ref にフォールバックする。
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Setup Rust toolchain (pinned via rust-toolchain.toml)
        uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
        with:
          target: ${{ matrix.target }}

      - name: musl ツールチェインを導入 (Linux ターゲットのみ)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: cargo build --release --locked
        run: cargo build --release --locked --target ${{ matrix.target }} -p flappy-term

      - name: tarball 作成 + SHA256
        id: package
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          if [[ "${EVENT_NAME}" == "workflow_dispatch" ]]; then
            tag="${INPUT_TAG}"
          else
            tag="${GITHUB_REF#refs/tags/}"
          fi
          if [[ ! "${tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.-]+)?$ ]]; then
            echo "::error::想定外の tag 形式です: ${tag}"
            exit 1
          fi
          version="${tag#v}"
          target="${TARGET}"
          archive="flappy-${version}-${target}.tar.gz"

          staging="flappy-${version}-${target}"
          mkdir -p "${staging}"
          cp "target/${target}/release/flappy" "${staging}/"
          cp README.md LICENSE "${staging}/"

          tar czf "${archive}" "${staging}"
          shasum -a 256 "${archive}" > "${archive}.sha256"

          echo "archive=${archive}" >> "$GITHUB_OUTPUT"

      - name: artifact をアップロード
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: flappy-${{ matrix.target }}
          path: |
            ${{ steps.package.outputs.archive }}
            ${{ steps.package.outputs.archive }}.sha256
          if-no-files-found: error
          retention-days: 7

  release:
    name: GitHub Release を作成
    needs: build
    runs-on: ubuntu-latest
    # GitHub Release の作成（タグ・リリースノート・アセット添付）に contents: write が必要。
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          merge-multiple: true

      - name: SHA256SUMS を集約
        working-directory: dist
        run: |
          set -euo pipefail
          # 個別の *.sha256 を 1 ファイルにまとめる。
          # verify は `shasum -a 256 -c SHA256SUMS` で全アーカイブを検証できる。
          : > SHA256SUMS
          while read -r line; do
            hash="${line%% *}"
            path="${line##* }"
            base="$(basename "${path}")"
            echo "${hash}  ${base}" >> SHA256SUMS
          done < <(find . -name '*.sha256' -exec cat {} \;)
          find . -name '*.sha256' -delete
          echo "--- dist/ ---"
          ls -la
          echo "--- SHA256SUMS ---"
          cat SHA256SUMS

      - name: Release を発行
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          # tag push 起動時は GITHUB_REF から自動解決される。
          # workflow_dispatch のときは入力された tag を使う。
          tag_name: ${{ github.event.inputs.tag }}
          draft: false
          prerelease: false
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/flappy-*.tar.gz
            dist/SHA256SUMS
