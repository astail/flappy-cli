name: CI

on:
  # push は main のみ（直 push / merge の検証）。ブランチの PR 検証は pull_request に任せ、
  # 同一 commit で push と pull_request が二重起動するのを防ぐ。
  push:
    branches: [main]
  pull_request:
  # runner 障害など一過性失敗時に Actions UI から手動再実行できるようにする。
  workflow_dispatch:

# 同一 ref の進行中 run はキャンセルして無駄 run を削る。
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# fmt/clippy/test のみ。書き込み権限は不要なので最小権限に絞る（least privilege）。
permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Rust toolchain (pinned via rust-toolchain.toml)
        uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
        with:
          components: rustfmt, clippy

      - name: Format check
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: Test
        run: cargo test --workspace --locked

  # web は wasm 専用（root workspace から exclude）。専用ジョブで品質ゲート + trunk build。
  wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Rust toolchain (+ wasm32 target)
        uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
        with:
          components: rustfmt, clippy
          target: wasm32-unknown-unknown

      - name: Install trunk
        uses: taiki-e/install-action@50414676f9f5d50a65992c6dd2ed02641263226c # v2.82.10
        with:
          # ビルド再現性のためバージョン固定（pages.yml と揃える）。
          tool: trunk@0.21.14

      - name: Format check (web)
        run: cargo fmt --all --check
        working-directory: crates/web

      - name: Clippy (web)
        run: cargo clippy --target wasm32-unknown-unknown --all-targets --locked -- -D warnings
        working-directory: crates/web

      - name: Trunk build (web)
        run: trunk build --locked
        working-directory: crates/web
