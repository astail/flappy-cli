name: CI

on:
  # push は main のみ（直 push / merge の検証）。ブランチの PR 検証は pull_request に任せ、
  # 同一 commit で push と pull_request が二重起動するのを防ぐ。
  push:
    branches: [main]
  pull_request:

# 同一 ref の進行中 run はキャンセルして無駄 run を削る。
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# fmt/clippy/test のみ。書き込み権限は不要なので最小権限に絞る（least privilege）。
permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust toolchain (pinned via rust-toolchain.toml)
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt, clippy

      - name: Format check
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace

  # web は wasm 専用（root workspace から exclude）。専用ジョブで品質ゲート + trunk build。
  wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust toolchain (+ wasm32 target)
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt, clippy
          target: wasm32-unknown-unknown

      - name: Install trunk
        uses: taiki-e/install-action@v2
        with:
          tool: trunk

      - name: Format check (web)
        run: cargo fmt --all --check
        working-directory: crates/web

      - name: Clippy (web)
        run: cargo clippy --target wasm32-unknown-unknown --all-targets -- -D warnings
        working-directory: crates/web

      - name: Trunk build (web)
        run: trunk build
        working-directory: crates/web
